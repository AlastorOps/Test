<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
    --green: #00ff88;
    --green-dim: #00aa55;
    --green-dark: #003322;
    --red: #ff2255;
    --yellow: #ffcc00;
    --glow: 0 0 10px #00ff88, 0 0 20px #00ff8866, 0 0 40px #00ff8833;
    --glow-sm: 0 0 6px #00ff88, 0 0 12px #00ff8844;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'VT323', monospace;
    color: var(--green);
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .title {
    font-size: 5rem;
    letter-spacing: 0.3em;
    text-shadow: var(--glow);
    animation: flicker 4s infinite;
    margin-bottom: 0.2em;
    line-height: 1;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  .hud {
    display: flex;
    gap: 3rem;
    margin-bottom: 1rem;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hud-label {
    font-size: 0.9rem;
    color: var(--green-dim);
    letter-spacing: 0.2em;
  }

  .hud-value {
    color: var(--green);
    text-shadow: var(--glow-sm);
    font-size: 2rem;
  }

  .canvas-wrapper {
    position: relative;
    border: 2px solid var(--green-dim);
    box-shadow: var(--glow), inset 0 0 30px rgba(0,255,136,0.05);
    background: var(--panel);
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 10;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 3.5rem;
    color: var(--green);
    text-shadow: var(--glow);
    letter-spacing: 0.3em;
    margin-bottom: 0.5rem;
  }

  .overlay-sub {
    font-size: 1.4rem;
    color: var(--green-dim);
    letter-spacing: 0.15em;
    margin-bottom: 0.3rem;
  }

  .overlay-score {
    font-size: 2rem;
    color: var(--yellow);
    text-shadow: 0 0 10px var(--yellow);
    margin-bottom: 1.5rem;
  }

  .btn {
    font-family: 'VT323', monospace;
    font-size: 1.6rem;
    letter-spacing: 0.2em;
    color: var(--bg);
    background: var(--green);
    border: none;
    padding: 0.3em 1.5em;
    cursor: pointer;
    box-shadow: var(--glow-sm);
    transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase;
  }

  .btn:hover {
    transform: scale(1.05);
    box-shadow: var(--glow);
  }

  .btn:active { transform: scale(0.97); }

  .controls {
    margin-top: 1rem;
    display: flex;
    gap: 1.5rem;
    font-size: 1rem;
    color: var(--green-dim);
    letter-spacing: 0.1em;
  }

  .key {
    display: inline-block;
    border: 1px solid var(--green-dim);
    padding: 0 0.4em;
    color: var(--green);
    font-size: 0.9rem;
  }

  /* Mobile D-pad */
  .dpad {
    display: none;
    margin-top: 1rem;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(3, 48px);
    gap: 4px;
  }

  .dpad-btn {
    font-family: 'VT323', monospace;
    font-size: 1.6rem;
    background: var(--panel);
    border: 1px solid var(--green-dim);
    color: var(--green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }

  .dpad-btn:active { background: var(--green-dark); }
  .dpad-btn.empty { border: none; background: transparent; pointer-events: none; }

  @media (max-width: 600px) {
    .dpad { display: grid; }
    .title { font-size: 3rem; }
    .controls { display: none; }
  }
</style>
</head>
<body>

<div class="title">SNAKE</div>

<div class="hud">
  <div class="hud-item">
    <span class="hud-label">SCORE</span>
    <span class="hud-value" id="score">000</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">BEST</span>
    <span class="hud-value" id="best">000</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">LEVEL</span>
    <span class="hud-value" id="level">1</span>
  </div>
</div>

<div class="canvas-wrapper">
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div class="overlay" id="overlay">
    <div class="overlay-title" id="overlayTitle">SNAKE</div>
    <div class="overlay-sub" id="overlaySub">USE ARROW KEYS OR WASD</div>
    <div class="overlay-score" id="overlayScore"></div>
    <button class="btn" id="startBtn">START GAME</button>
  </div>
</div>

<div class="controls">
  <span><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> or <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> — MOVE</span>
  <span><span class="key">P</span> — PAUSE</span>
</div>

<!-- Mobile D-pad -->
<div class="dpad">
  <div class="dpad-btn empty"></div>
  <div class="dpad-btn" id="dUp">▲</div>
  <div class="dpad-btn empty"></div>
  <div class="dpad-btn" id="dLeft">◀</div>
  <div class="dpad-btn empty"></div>
  <div class="dpad-btn" id="dRight">▶</div>
  <div class="dpad-btn empty"></div>
  <div class="dpad-btn" id="dDown">▼</div>
  <div class="dpad-btn empty"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 20, ROWS = 20;
const CELL = canvas.width / COLS;

let snake, dir, nextDir, food, score, best, level, speed, gameLoop, running, paused;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const overlayScore = document.getElementById('overlayScore');
const startBtn = document.getElementById('startBtn');

best = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = String(best).padStart(3, '0');

function initGame() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  speed = 150;
  scoreEl.textContent = '000';
  levelEl.textContent = '1';
  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  if (!running || paused) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    scoreEl.textContent = String(score).padStart(3, '0');
    if (score > best) {
      best = score;
      bestEl.textContent = String(best).padStart(3, '0');
      localStorage.setItem('snakeBest', best);
    }
    // Level up every 50 pts
    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel > level) {
      level = newLevel;
      levelEl.textContent = level;
      speed = Math.max(60, 150 - (level - 1) * 18);
      restartLoop();
    }
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Snake
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const alpha = 0.3 + ratio * 0.7;

    if (i === 0) {
      // Head — bright
      ctx.fillStyle = `rgba(0,255,136,${alpha})`;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12;
      ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);

      // Eyes
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      const ex = dir.x, ey = dir.y;
      const cx = seg.x * CELL + CELL / 2;
      const cy = seg.y * CELL + CELL / 2;
      const eyeOffset = CELL * 0.22;
      const fwdOffset = CELL * 0.18;
      const eyeSize = CELL * 0.12;

      let e1, e2;
      if (ex === 1)       { e1 = {x: cx+fwdOffset, y: cy-eyeOffset}; e2 = {x: cx+fwdOffset, y: cy+eyeOffset}; }
      else if (ex === -1) { e1 = {x: cx-fwdOffset, y: cy-eyeOffset}; e2 = {x: cx-fwdOffset, y: cy+eyeOffset}; }
      else if (ey === 1)  { e1 = {x: cx-eyeOffset, y: cy+fwdOffset}; e2 = {x: cx+eyeOffset, y: cy+fwdOffset}; }
      else                { e1 = {x: cx-eyeOffset, y: cy-fwdOffset}; e2 = {x: cx+eyeOffset, y: cy-fwdOffset}; }

      ctx.beginPath(); ctx.arc(e1.x, e1.y, eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2.x, e2.y, eyeSize, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.shadowBlur = 4;
      ctx.shadowColor = '#00ff88';
      ctx.fillStyle = `rgba(0,${Math.floor(170 * ratio + 80)},${Math.floor(100 * ratio + 30)},${alpha})`;
      const pad = 2 + (1 - ratio) * 2;
      ctx.fillRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2);
    }
  });

  ctx.shadowBlur = 0;

  // Food — pulsing
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
  ctx.save();
  ctx.shadowColor = '#ff2255';
  ctx.shadowBlur = 16 * pulse;
  ctx.fillStyle = `rgba(255,34,85,${pulse})`;
  const fp = 3;
  ctx.fillRect(food.x * CELL + fp, food.y * CELL + fp, CELL - fp*2, CELL - fp*2);
  // Inner dot
  ctx.fillStyle = '#ffaaaa';
  ctx.shadowBlur = 6;
  ctx.fillRect(food.x * CELL + CELL/2 - 2, food.y * CELL + CELL/2 - 2, 4, 4);
  ctx.restore();
}

// Food pulse animation even when paused
let animFrame;
function animateFood() {
  if (!running) return;
  draw();
  animFrame = requestAnimationFrame(animateFood);
}

function restartLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(update, speed);
}

function startGame() {
  overlay.classList.add('hidden');
  initGame();
  running = true;
  paused = false;
  restartLoop();
  cancelAnimationFrame(animFrame);
  animateFood();
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  cancelAnimationFrame(animFrame);

  overlayTitle.textContent = 'GAME OVER';
  overlayTitle.style.color = '#ff2255';
  overlayTitle.style.textShadow = '0 0 10px #ff2255, 0 0 20px #ff225566';
  overlaySub.textContent = 'FINAL SCORE';
  overlayScore.textContent = String(score).padStart(3, '0');
  startBtn.textContent = 'PLAY AGAIN';
  overlay.classList.remove('hidden');
}

// Input
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d',' '].includes(e.key)) e.preventDefault();

  const map = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 },
    ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 },
    ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 },
  };

  if (map[e.key]) {
    const nd = map[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }

  if (e.key === 'p' || e.key === 'P') {
    if (!running) return;
    paused = !paused;
    if (!paused) draw();
  }
});

startBtn.addEventListener('click', startGame);

// D-pad
document.getElementById('dUp').addEventListener('click',    () => { if (dir.y !== 1)  nextDir = {x:0,y:-1}; });
document.getElementById('dDown').addEventListener('click',  () => { if (dir.y !== -1) nextDir = {x:0,y:1}; });
document.getElementById('dLeft').addEventListener('click',  () => { if (dir.x !== 1)  nextDir = {x:-1,y:0}; });
document.getElementById('dRight').addEventListener('click', () => { if (dir.x !== -1) nextDir = {x:1,y:0}; });

// Initial draw
ctx.clearRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
